<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="100%" height="100%">
  <defs>
    <linearGradient id="shieldGradFav" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="arrowGradFav" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d9488" />
      <stop offset="50%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#34d399" />
    </linearGradient>
    <filter id="glowFav" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <g transform="translate(10, 5)">
    <!-- Outer Shield Shadow/Glow -->
    <path d="M 50 10 C 75 10, 90 20, 90 50 C 90 80, 70 105, 50 115 C 30 105, 10 80, 10 50 C 10 20, 25 10, 50 10 Z" fill="#06b6d4" opacity="0.15" filter="url(#glowFav)" />
    
    <!-- Shield Background -->
    <path d="M 50 12 C 73 12, 88 22, 88 50 C 88 78, 68 102, 50 112 C 32 102, 12 78, 12 50 C 12 22, 27 12, 50 12 Z" fill="url(#shieldGradFav)" stroke="#0284c7" stroke-width="2" />
    
    <!-- Inner Shield Border -->
    <path d="M 50 18 C 68 18, 80 26, 80 50 C 80 72, 65 92, 50 101 C 35 92, 20 72, 20 50 C 20 26, 32 18, 50 18 Z" fill="none" stroke="#00f2fe" stroke-width="1" opacity="0.4" />

    <!-- Resume Document inside Shield -->
    <rect x="36" y="32" width="28" height="36" rx="2" fill="#ffffff" opacity="0.95" />
    <!-- Document Lines -->
    <line x1="42" y1="40" x2="58" y2="40" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="48" x2="58" y2="48" stroke="#0f172a" stroke-width="2" stroke-linecap="round" />
    <line x1="42" y1="56" x2="52" y2="56" stroke="#38bdf8" stroke-width="2" stroke-linecap="round" />
    
    <!-- Gears inside Shield -->
    <circle cx="34" cy="74" r="9" fill="#1e293b" stroke="#00f2fe" stroke-width="1.5" />
    <circle cx="34" cy="74" r="3" fill="#00f2fe" />
    
    <!-- Magnifying Glass Search Element -->
    <circle cx="68" cy="78" r="8" fill="none" stroke="#00f2fe" stroke-width="2" />
    <line x1="74" y1="84" x2="82" y2="92" stroke="#00f2fe" stroke-width="2.5" stroke-linecap="round" />

    <!-- Rising Success Arrow (Green/Teal Gradient) -->
    <path d="M 22 92 C 34 84, 52 68, 62 48 L 74 24" fill="none" stroke="url(#arrowGradFav)" stroke-width="6" stroke-linecap="round" />
    <!-- Arrow Head -->
    <path d="M 64 22 L 78 20 L 76 34 Z" fill="url(#arrowGradFav)" />
  </g>
</svg>